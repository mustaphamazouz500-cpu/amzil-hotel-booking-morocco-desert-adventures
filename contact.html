<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Morocco Desert Adventures</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37; --gold-light: #E8D07A; --terracotta: #C4734F;
            --deep-blue: #1A3650; --midnight: #0F1D2D; --cream: #FDF8F0;
            --white: #FFFFFF; --text: #1A1A1A; --text-light: #5C5C5C;
            --radius: 20px;
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'Inter', -apple-system, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: var(--font-body); background: var(--cream); color: var(--text); -webkit-font-smoothing: antialiased; }

        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(253,248,240,0.95); backdrop-filter: blur(30px);
            padding: 14px 0; box-shadow: 0 2px 30px rgba(0,0,0,0.05);
        }
        .nav-inner { max-width: 1300px; margin: 0 auto; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; }
        .nav-logo { font-family: var(--font-display); font-size: 24px; font-weight: 700; color: var(--midnight); text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .nav-logo-icon { width: 34px; height: 34px; border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .nav-links { display: flex; gap: 32px; align-items: center; }
        .nav-links a { color: var(--text); text-decoration: none; font-size: 12px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; }
        .nav-links a:hover { color: var(--gold-dark); }
        .btn-nav { padding: 12px 26px; background: var(--gold); color: var(--midnight) !important; border-radius: 4px; font-weight: 600 !important; }

        .page-hero {
            min-height: 30vh; display: flex; align-items: center; justify-content: center;
            text-align: center; margin-top: 70px;
            background: linear-gradient(135deg, #1A3650, #0F1D2D);
        }
        .hero-content h1 { font-family: var(--font-display); font-size: clamp(36px, 5vw, 52px); font-weight: 600; color: var(--white); }

        .section { padding: 60px 40px; max-width: 1000px; margin: 0 auto; }
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .contact-info { display: flex; flex-direction: column; gap: 24px; }
        .info-card {
            background: var(--white); border-radius: var(--radius); padding: 30px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04); text-align: center;
            transition: all 0.4s;
        }
        .info-card:hover { transform: translateY(-4px); }
        .info-icon { font-size: 32px; margin-bottom: 12px; display: block; }
        .info-card h3 { font-family: var(--font-display); font-size: 18px; color: var(--midnight); margin-bottom: 6px; }
        .info-card p { font-size: 13px; color: var(--text-light); }

        .contact-form {
            background: var(--white); border-radius: var(--radius); padding: 40px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.05);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--midnight); margin-bottom: 8px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 14px 16px; border: 1px solid rgba(0,0,0,0.08);
            border-radius: 8px; font-size: 14px; font-family: var(--font-body);
            background: var(--cream); transition: all 0.4s;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--gold); background: var(--white); }
        .form-group textarea { min-height: 120px; resize: vertical; }
        .btn-submit {
            width: 100%; padding: 16px; background: var(--gold); color: var(--midnight);
            font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
            border: none; border-radius: 8px; cursor: pointer; font-family: var(--font-body);
            transition: all 0.5s;
        }
        .btn-submit:hover { background: var(--gold-dark); transform: translateY(-2px); }

        .footer { background: #0A1219; color: var(--white); padding: 50px 40px 30px; margin-top: 60px; }
        .footer-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .footer-inner p { color: rgba(255,255,255,0.35); font-size: 12px; }
        .footer-inner a { color: var(--gold-light); text-decoration: none; font-size: 12px; }

        @media (max-width: 768px) { .contact-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo"><span class="nav-logo-icon">✧</span> M. D. A.</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="agafay.html">Agafay</a>
                <a href="marrakech.html">Marrakech</a>
                <a href="imlil.html">Imlil</a>
                <a href="merzouga.html">Merzouga</a>
                <a href="booking.html" class="btn-nav">Book Now</a>
            </div>
        </div>
    </nav>

    <section class="page-hero"><div class="hero-content"><h1>Let's Talk</h1></div></section>

    <section class="section">
        <div class="contact-grid">
            <div class="contact-info">
                <div class="info-card"><span class="info-icon">📞</span><h3>Call / WhatsApp</h3><p>+212 6XX-XXXXXX</p></div>
                <div class="info-card"><span class="info-icon">✉️</span><h3>Email</h3><p>contact@moroccodesert.com</p></div>
                <div class="info-card"><span class="info-icon">📍</span><h3>Office</h3><p>Marrakech, Morocco</p></div>
                <div class="info-card"><span class="info-icon">⏰</span><h3>Response</h3><p>Within 24 hours</p></div>
            </div>
            <form class="contact-form" action="https://formspree.io/f/xdaypkly" method="POST">
                <div class="form-group"><label>Full Name *</label><input type="text" name="name" placeholder="Your full name" required></div>
                <div class="form-group"><label>Email *</label><input type="email" name="email" placeholder="your@email.com" required></div>
                <div class="form-group"><label>Subject *</label><select name="subject" required><option value="">Select...</option><option value="booking">Booking Question</option><option value="custom">Custom Tour</option><option value="support">Support</option><option value="other">Other</option></select></div>
                <div class="form-group"><label>Message *</label><textarea name="message" placeholder="How can we help you?" required></textarea></div>
                <input type="hidden" name="_captcha" value="false">
                <button type="submit" class="btn-submit">✈️ Send Message</button>
            </form>
        </div>
    </section>

    <footer class="footer"><div class="footer-inner"><p>© 2026 Morocco Desert Adventures.</p><p><a href="index.html">Home</a> · <a href="booking.html">Book Now</a></p></div></footer>
</body>
</html>
