<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Tour | Morocco Desert Adventures</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A96E; --terracotta: #C4734F; --deep-blue: #1B3A4B;
            --dark: #0F1A1F; --cream: #FBF7F0; --white: #FFFFFF;
            --text: #2C2416; --text-light: #6B5E4A;
            --radius: 16px; --shadow: 0 8px 40px rgba(0,0,0,0.12);
            --font-heading: 'Playfair Display', Georgia, serif;
            --font-body: 'Inter', -apple-system, sans-serif;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font-body); background: var(--cream); color: var(--text); }

        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(251,247,240,0.92); backdrop-filter: blur(20px);
            padding: 16px 0; box-shadow: 0 2px 20px rgba(0,0,0,0.06);
        }
        .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
        .nav-logo { font-family: var(--font-heading); font-size: 24px; font-weight: 900; color: var(--deep-blue); text-decoration: none; }
        .nav-logo span { color: var(--terracotta); }
        .nav-links { display: flex; gap: 28px; align-items: center; }
        .nav-links a { color: var(--text); text-decoration: none; font-weight: 500; font-size: 14px; }
        .nav-links a:hover { color: var(--terracotta); }
        .btn-book { background: var(--terracotta); color: white !important; padding: 12px 24px; border-radius: 8px; font-weight: 700 !important; }

        .page-container { max-width: 700px; margin: 120px auto 60px; padding: 0 24px; }
        h1 { font-family: var(--font-heading); font-size: 36px; font-weight: 900; color: var(--deep-blue); text-align: center; margin-bottom: 8px; }
        .sub { text-align: center; color: var(--text-light); margin-bottom: 40px; }

        .booking-form { background: white; border-radius: var(--radius); padding: 40px; box-shadow: var(--shadow); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group.full { grid-column: 1 / -1; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 13px; color: var(--deep-blue); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 14px; font-family: var(--font-body); transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: var(--terracotta); box-shadow: 0 0 0 3px rgba(196,115,79,0.1);
        }
        .btn-submit {
            width: 100%; padding: 16px; background: var(--terracotta); color: white;
            font-size: 16px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer;
            font-family: var(--font-body); transition: all 0.3s;
        }
        .btn-submit:hover { background: #a55f3d; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(196,115,79,0.3); }

        .footer { background: var(--dark); color: white; padding: 30px 24px; text-align: center; font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 40px; }
        .footer a { color: var(--gold); text-decoration: none; }

        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">Morocco<span>Desert</span>Adventures</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="agafay.html">Agafay</a>
                <a href="marrakech.html">Marrakech</a>
                <a href="imlil.html">Imlil</a>
                <a href="merzouga.html">Merzouga</a>
                <a href="booking.html" class="btn-book">Book Now</a>
            </div>
        </div>
    </nav>

    <div class="page-container">
        <h1>📅 Book Your Tour</h1>
        <p class="sub">Fill out the form below and our team will confirm your booking within 24 hours</p>

        <form class="booking-form" action="https://formspree.io/f/xdaypkly" method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" name="first-name" placeholder="John" required>
                </div>
                <div class="form-group">
                    <label>Last Name *</label>
                    <input type="text" name="last-name" placeholder="Smith" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" name="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Phone Number (WhatsApp) *</label>
                    <input type="tel" name="phone" placeholder="+212..." required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Destination *</label>
                    <select name="destination" required>
                        <option value="">Select destination...</option>
                        <option value="agafay">Agafay Desert</option>
                        <option value="marrakech">Marrakech</option>
                        <option value="imlil">Imlil & Atlas Mountains</option>
                        <option value="merzouga">Merzouga Desert</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Activity / Tour *</label>
                    <select name="activity" required>
                        <option value="">Select activity...</option>
                        <option value="quad">Quad Biking</option>
                        <option value="camel">Camel Ride</option>
                        <option value="dinner">Dinner & Show</option>
                        <option value="camp">Desert Camp</option>
                        <option value="hotel">Hotel Booking</option>
                        <option value="trek">Mountain Trek</option>
                        <option value="medina">Medina Tour</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Check-in / Tour Date *</label>
                    <input type="date" name="date" required>
                </div>
                <div class="form-group">
                    <label>Number of People *</label>
                    <input type="number" name="people" placeholder="1" min="1" max="20" required>
                </div>
            </div>
            <div class="form-group full" style="margin-bottom:20px;">
                <label>Special Requests (Optional)</label>
                <textarea name="message" rows="4" placeholder="Any special requests, dietary needs, or questions..."></textarea>
            </div>
            <input type="hidden" name="_captcha" value="false">
            <button type="submit" class="btn-submit">✈️ Submit Booking Request</button>
        </form>
    </div>

    <footer class="footer">
        <p>© 2026 Morocco Desert Adventures. | <a href="index.html">Home</a> | <a href="contact.html">Contact</a></p>
    </footer>
</body>
</html>
